name: Build Panel
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go mod init cloud-hub
          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -ldflags "-s -w" -o panel_armv7 .
      - uses: actions/upload-artifact@v4
        with:
          name: panel-armv7
          path: panel_armv7
